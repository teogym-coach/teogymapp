<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#09090c" />
  <meta name="description" content="PT 트레이너용 수업일지 관리 앱" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TEO GYM" />

  <!-- Favicon / 브라우저 탭 아이콘 (TG 브랜드 아이콘, ?v=6로 캐시 무효화) -->
  <!-- 순서: svg(최신 브라우저 우선) → ico(브라우저 자동 프로브 대비) → png 폴백들 → apple-touch-icon → mask-icon → Windows tile → manifest -->
  <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg?v=6" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico?v=6" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png?v=6" />
  <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png?v=6" />
  <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icon-192.png?v=6" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png?v=6" />
  <!-- Safari 고정 탭(macOS) 마스크 아이콘 — 단색 실루엣만 렌더링되고 color 속성이 실제 표시 색상이 됨 -->
  <link rel="mask-icon" href="%PUBLIC_URL%/safari-pinned-tab.svg?v=6" color="#09090c" />
  <!-- Windows 타일 -->
  <meta name="msapplication-TileImage" content="%PUBLIC_URL%/mstile-150x150.png?v=6" />
  <meta name="msapplication-TileColor" content="#09090c" />
  <meta name="msapplication-config" content="%PUBLIC_URL%/browserconfig.xml?v=6" />

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json?v=6" />
  <title>TEO GYM</title>
</head>
<body>
  <noscript>JavaScript가 필요합니다.</noscript>
  <div id="root"></div>
</body>
</html>
